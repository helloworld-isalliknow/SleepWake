<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:-apple-system, BlinkMacSystemFont;
  background:white;
  margin:0;
  padding:0;
}

.container{
  width:100%;
  min-height:100vh;
  box-sizing:border-box;
  padding:20px;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

h1{
  text-align:center;
}

.time{
  text-align:center;
  color:#666;
  margin-bottom:10px;
}

.controls{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:15px;
  color:white;
}

.record{ background:#10b981; }
.delete{ background:#ef4444; }
.export{ background:#3b82f6; }

select{
  width:100%;
  margin-bottom:15px;
  padding:8px;
}

.columns{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
  background:#f5f5f5;
  border-radius:10px;
  padding:10px;
}

.item{
  font-size:13px;
  border-bottom:1px solid #ddd;
  padding:5px;
}

.chartbox{
  margin-top:20px;
}

.stats{
  margin-top:15px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>Sleep Tracker</h1>
<div class="time" id="time"></div>

<div class="controls">
  <button class="record" id="recordBtn">Record</button>
  <button class="delete" id="deleteBtn">Delete Latest</button>
  <button class="export" id="exportBtn">Export</button>
</div>

<select id="monthSelect"></select>

<div class="columns">
  <div class="col">
    <h3>Sleep</h3>
    <div id="sleepList"></div>
  </div>
  <div class="col">
    <h3>Wake</h3>
    <div id="wakeList"></div>
  </div>
</div>

<div class="chartbox">
  <canvas id="chart"></canvas>
</div>

<div class="stats" id="stats"></div>

</div>

<script>

// 时间显示
function updateClock(){
  document.getElementById("time").innerText=new Date().toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

// 数据
function getData(){ return JSON.parse(localStorage.getItem("sleepData")||"[]"); }
function saveData(d){ localStorage.setItem("sleepData",JSON.stringify(d)); }

// 智能记录
function record(){
  let now=new Date();
  let hour=now.getHours();

  let type;

  if(hour>=18 || hour<6){
    type="sleep";
  }else{
    type="wake";
  }

  let data=getData();
  data.push({type,time:Date.now()});
  saveData(data);
  render();
}

// 删除最新
function deleteLatest(){
  let data=getData();
  data.pop();
  saveData(data);
  render();
}

// 导出
function exportData(){
  let data=localStorage.getItem("sleepData")||"[]";
  let blob=new Blob([data],{type:"application/json"});
  let url=URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="sleepData.json";
  a.click();
}

// 绑定按钮
document.getElementById("recordBtn").onclick=record;
document.getElementById("deleteBtn").onclick=deleteLatest;
document.getElementById("exportBtn").onclick=exportData;

// 工具函数
function minutes(t){
  let d=new Date(t);
  return d.getHours()*60+d.getMinutes();
}

function format(t){
  let d=new Date(t);
  return `${d.getFullYear()%100}-${d.getMonth()+1}-${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function getMonthStr(t){
  let d=new Date(t);
  return d.getFullYear()+"-"+(d.getMonth()+1);
}

// 渲染
function render(){
  let data=getData();

  let month=document.getElementById("monthSelect").value;
  let show=month && month!=="ALL" ? data.filter(d=>getMonthStr(d.time)===month):data;

  let sleep=show.filter(d=>d.type==="sleep");
  let wake=show.filter(d=>d.type==="wake");

  document.getElementById("sleepList").innerHTML=sleep.map(d=>`<div class="item">${format(d.time)}</div>`).join("");
  document.getElementById("wakeList").innerHTML=wake.map(d=>`<div class="item">${format(d.time)}</div>`).join("");

  updateMonths();
  updateChart(show);
}

// 月份
function updateMonths(){
  let data=getData();
  let months=[...new Set(data.map(d=>getMonthStr(d.time)))];

  let sel=document.getElementById("monthSelect");
  let cur=sel.value;

  sel.innerHTML="<option>ALL</option>";
  months.forEach(m=>sel.innerHTML+=`<option>${m}</option>`);

  sel.value=cur||"ALL";
}

// 图表
let chart;
function minutesForChart(t){
  let d=new Date(t);
  return (d.getHours()*60+d.getMinutes()-240+1440)%1440;
}

function formatTime(m){
  let t=(m+240)%1440;
  let h=Math.floor(t/60);
  let min=t%60;
  return h+":"+min.toString().padStart(2,'0');
}

function updateChart(data){

  let sleep=data.filter(d=>d.type==="sleep");
  let wake=data.filter(d=>d.type==="wake");

  let labels=sleep.map(d=>format(d.time));
  let sleepY=sleep.map(d=>minutesForChart(d.time));
  let wakeY=wake.map(d=>minutesForChart(d.time));

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {label:"Sleep",data:sleepY,borderColor:"#10b981"},
        {label:"Wake",data:wakeY,borderColor:"#f59e0b"}
      ]
    },
    options:{
      scales:{
        y:{
          min:0,
          max:1440,
          ticks:{
            stepSize:240,
            callback:v=>formatTime(v)
          }
        }
      }
    }
  });

  calcStats(data);
}

// 统计
function avg(arr){
  return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
}

function calcStats(data){
  let s=[],w=[];

  data.forEach(d=>{
    if(d.type==="sleep") s.push(minutes(d.time));
    if(d.type==="wake") w.push(minutes(d.time));
  });

  function fmt(m){
    if(!m && m!==0) return "-";
    let h=Math.floor(m/60);
    let mm=Math.round(m%60);
    return h+":"+mm.toString().padStart(2,'0');
  }

  document.getElementById("stats").innerHTML=
    `Avg Sleep: ${fmt(avg(s))}<br>Avg Wake: ${fmt(avg(w))}`;
}

// 切换月份
document.getElementById("monthSelect").onchange=render;

render();

</script>
</body>
</html>
