<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background:#f2f2f7;
  margin:0;
  padding:0;
}

.container{
  width:100%;
  min-height:100vh;
  background:white;
  padding:20px;
  box-sizing:border-box;
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:60px;
}

.time{
  font-size:40px;
  margin-bottom:60px;
  color:#555;
  text-align:center;
}

.controls{
  display:flex;
  gap:12px;
  margin-bottom:40px;
}

button{
  flex:1;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:40px;
  cursor:pointer;
}

.record{
  background:#10b981;
  color:white;
}

.delete{
  background:#ef4444;
  color:white;
}

.export{
  background:#facc15;
  color:white;
}

select{
  margin:12px 0;
  width:100%;
  padding:12px;
  font-size:40px;
}

.stats-container{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.stats-col{
  flex:1;
  background:#f9fafb;
  padding:12px;
  border-radius:10px;
  font-size:25px;
}

.week-records{
  margin-top:10px;
  font-size:25px;
}

.columns{
  display:flex;
  gap:10px;
  margin-bottom:60px;
}

.col{
  flex:1;
  background:#fafafa;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.col h3{
  font-size:45px;
  margin-bottom:40px;
}

.item{
  font-size:35px;
  padding:6px;
  border-bottom:1px solid #eee;
}

.compare{
  font-size:30px;
}

.earlier{ color:green; }
.later{ color:red; }

.chartbox{
  margin-top:60px;
}

canvas{
  max-height:700px; /* 图表高度调大 */
}

</style>
</head>

<body>

<div class="container">
  <h1>Sleep Tracker</h1>
  <div class="time" id="time"></div>

  <div class="controls">
    <button id="recordBtn" class="record">Record</button>
    <button id="deleteBtn" class="delete">Delete Latest</button>
    <button id="exportBtn" class="export">Export Data</button>
  </div>

  <!-- 新增统计区域 -->
  <div class="stats-container" id="statsContainer">
    <div class="stats-col" id="weekdayStats"></div>
    <div class="stats-col" id="weekendStats"></div>
  </div>

  <div class="week-records" id="weekRecords"></div>

  <select id="monthSelect"></select>

  <div class="columns">
    <div class="col">
      <h3>Sleep</h3>
      <div id="sleepList"></div>
    </div>
    <div class="col">
      <h3>Wake</h3>
      <div id="wakeList"></div>
    </div>
  </div>

  <div class="chartbox">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// 时间显示
function updateClock() {
  document.getElementById("time").innerText = new Date().toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

// localStorage
function getData(){ return JSON.parse(localStorage.getItem("sleepData")||"[]"); }
function saveData(data){ localStorage.setItem("sleepData",JSON.stringify(data)); }

// -------------------
// Record（自动判断类型）
document.getElementById("recordBtn").addEventListener("click",()=>{
  let now = new Date();
  let hour = now.getHours();

  let type = (hour >=18 || hour <6) ? "sleep" : "wake";

  let data=getData();
  data.push({type,time:Date.now()});
  saveData(data);
  render();
});

// -------------------
// 删除最近一条
document.getElementById("deleteBtn").addEventListener("click",()=>{
  let data=getData();
  if(data.length>0){
    data.sort((a,b)=>b.time-a.time);
    data.shift();
    saveData(data);
    render();
  }
});

// -------------------
// 导出数据
document.getElementById("exportBtn").addEventListener("click",()=>{
  let data=getData();
  let blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  let url = URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="sleep-data.json";
  a.click();

  URL.revokeObjectURL(url);
});

// -------------------
// 工具函数
function minutes(t){ let d = new Date(t); return d.getHours()*60 + d.getMinutes(); }

function compare(current,prev){
  if(!prev) return "";
  let diff = minutes(current) - minutes(prev);
  let m = Math.abs(diff);
  if(diff<0) return `<div class="compare earlier">↑ ${m} min earlier</div>`;
  else return `<div class="compare later">↓ ${m} min later</div>`;
}

function formatDateWithWeekday(t){
  const d = new Date(t);
  const weekDays=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const yy = d.getFullYear()%100;
  const mm = d.getMonth()+1;
  const dd = d.getDate();
  const hh = d.getHours();
  const min = d.getMinutes();
  return `${yy}-${mm}-${dd} ${weekDays[d.getDay()]} ${hh}:${min<10?'0':''}${min}`;
}

function getMonthStr(t){
  const d = new Date(t);
  return d.getFullYear()+"-M"+(d.getMonth()+1);
}

// -------------------
// 渲染
function render(){
  let data=getData();

  let monthSel=document.getElementById("monthSelect");
  let selValue=monthSel.value;
  let showData = (selValue && selValue!=="ALL") ? data.filter(d=>getMonthStr(d.time)===selValue) : data;

  let sleep=showData.filter(d=>d.type==="sleep");
  let wake=showData.filter(d=>d.type==="wake");

  document.getElementById("sleepList").innerHTML =
    sleep.map((r,i)=>`<div class="item">${formatDateWithWeekday(r.time)} ${compare(r.time,sleep[i-1]?.time)}</div>`).join("");

  document.getElementById("wakeList").innerHTML =
    wake.map((r,i)=>`<div class="item">${formatDateWithWeekday(r.time)} ${compare(r.time,wake[i-1]?.time)}</div>`).join("");

  updateMonths();
  updateChart();
  updateStats(showData);
}

// -------------------
// 月份
function updateMonths(){
  let data=getData();
  let months=[...new Set(data.map(d=>getMonthStr(d.time)))];
  let select=document.getElementById("monthSelect");
  let curVal=select.value;

  select.innerHTML="<option>ALL</option>";
  months.forEach(m=>select.innerHTML+=`<option>${m}</option>`);

  if(curVal) select.value=curVal; else select.value="ALL";
}

// -------------------
// 图表
let chart;

function minutesForChart(t){
  const d = new Date(t);
  const totalMins = d.getHours()*60 + d.getMinutes();
  return (totalMins - 240 + 1440) % 1440;
}

function formatTimeFromMins(m){
  let total = (m + 240) % 1440;
  let h=Math.floor(total/60);
  let min=total%60;
  return h+":"+(min<10?'0':'')+min;
}

function formatDateForChart(t){
  const d = new Date(t);
  return `${d.getFullYear()%100}-${d.getMonth()+1}-${d.getDate()}`;
}

function updateChart(){
  let data=getData();
  let month=document.getElementById("monthSelect").value;
  let showData = (month && month!=="ALL") ? data.filter(d=>getMonthStr(d.time)===month) : data;

  let sleep=showData.filter(d=>d.type==="sleep");
  let wake=showData.filter(d=>d.type==="wake");

  let labels = sleep.map(s=>formatDateForChart(s.time));
  let sleepY = sleep.map(s=>minutesForChart(s.time));
  let wakeY = wake.map(w=>minutesForChart(w.time));

  if(chart) chart.destroy();

  let ctx=document.getElementById("chart").getContext("2d");

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {label:"Sleep", data:sleepY, borderColor:"#10b981", fill:false},
        {label:"Wake", data:wakeY, borderColor:"#f59e0b", fill:false}
      ]
    },
    options:{
      plugins:{
        legend:{
          labels:{
            font:{size:25} // 调大图例字体
          }
        }
      },
      scales:{
        x:{
          ticks:{ autoSkip:true, maxTicksLimit:10, font:{size:20} } // 调大x轴字体
        },
        y:{
          min:0,
          max:1440,
          ticks:{
            stepSize:240,
            font:{size:20}, // 调大y轴字体
            callback:v=>formatTimeFromMins(v)
          }
        }
      }
    }
  });
}

// -------------------
// 统计计算
function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null; }

function updateStats(data){
  let weekdaySleep=[], weekdayWake=[], weekendSleep=[], weekendWake=[];

  data.forEach(d=>{
    let day=new Date(d.time).getDay();
    let m=minutes(d.time);
    if(day===0||day===6){
      if(d.type==="sleep") weekendSleep.push(m);
      if(d.type==="wake") weekendWake.push(m);
    }else{
      if(d.type==="sleep") weekdaySleep.push(m);
      if(d.type==="wake") weekdayWake.push(m);
    }
  });

  function fmtTime(m){
    if(!m && m!==0) return "-";
    let h=Math.floor(m/60);
    let mm=Math.round(m%60);
    return h+":"+(mm<10?'0':'')+mm;
  }

  // 平均睡眠时长 = wake - sleep
  function avgBedtime(sleepArr,wakeArr){
    if(sleepArr.length===0 || wakeArr.length===0) return "-";
    let total=0,count=0;
    for(let i=0;i<Math.min(sleepArr.length,wakeArr.length);i++){
      total += (wakeArr[i]-sleepArr[i]+1440)%1440;
      count++;
    }
    return fmtTime(total/count);
  }

  document.getElementById("weekdayStats").innerHTML=
    `<b>Weekday Avg</b><br>Sleep: ${fmtTime(avg(weekdaySleep))}<br>Wake: ${fmtTime(avg(weekdayWake))}<br>Bedtime: ${avgBedtime(weekdaySleep,weekdayWake)}`;

  document.getElementById("weekendStats").innerHTML=
    `<b>Weekend Avg</b><br>Sleep: ${fmtTime(avg(weekendSleep))}<br>Wake: ${fmtTime(avg(weekendWake))}<br>Bedtime: ${avgBedtime(weekendSleep,weekendWake)}`;

  // 本周最早记录
  let now = new Date();
  let dayOfWeek = now.getDay();
  let weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dayOfWeek);
  let weekData = data.filter(d=>new Date(d.time) >= weekStart);

  let earliestSleep = weekData.filter(d=>d.type==="sleep").sort((a,b)=>a.time-b.time)[0]?.time;
  let earliestWake = weekData.filter(d=>d.type==="wake").sort((a,b)=>a.time-b.time)[0]?.time;

  document.getElementById("weekRecords").innerHTML=
    `<b>Week Records:</b><br>Earliest Sleep Record: ${earliestSleep?formatDateWithWeekday(earliestSleep):"-"}<br>Earliest Wake Record: ${earliestWake?formatDateWithWeekday(earliestWake):"-"}`;
}

// 下拉框切换
document.getElementById("monthSelect").addEventListener("change",render);

// 初始
render();
</script>

</body>
</html>
