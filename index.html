<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background:#f2f2f7;
  margin:0;
  padding:0;
}

.container{
  width:100%;
  min-height:100vh;
  background:white;
  padding:20px;
  box-sizing:border-box;
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:60px;
}

.time{
  font-size:40px;
  margin-bottom:60px;
  color:#555;
  text-align:center;
}

.controls{
  display:flex;
  gap:12px;
  margin-bottom:40px;
}

button{
  flex:1;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:40px;
  cursor:pointer;
}

.record{ background:#10b981; color:white; }
.delete{ background:#ef4444; color:white; }
.export{ background:#facc15; color:white; }

select{
  margin:12px 0;
  width:100%;
  padding:12px;
  font-size:40px;
}

/* 统计区域 */
.stats-container{
  display:flex;
  gap:10px;
  margin-bottom:60px;
}

.stats-col{
  flex:1;
  background:#f9fafb;
  padding:12px;
  border-radius:10px;
  font-size:30px;
}

/* 表格 */
.columns{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.col{
  flex:1;
  background:#fafafa;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.col h3{
  font-size:35px;
  margin-bottom:20px;
}

/* ⭐ 修复后的核心布局 */
.item{
  height:90px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  border-bottom:1px solid #eee;
  font-size:28px;
}

.main-text{
  line-height:1.2;
}

.compare{
  font-size:22px;
  margin-top:4px;
}

.earlier{ color:green; }
.later{ color:red; }

.chartbox{
  margin-top:60px;
}

canvas{
  max-height:700px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Sleep Tracker</h1>
  <div class="time" id="time"></div>

  <div class="controls">
    <button id="recordBtn" class="record">Record</button>
    <button id="deleteBtn" class="delete">Delete Latest</button>
    <button id="exportBtn" class="export">Export Data</button>
  </div>

  <div class="stats-container">
    <div class="stats-col" id="weekdayStats"></div>
    <div class="stats-col" id="weekendStats"></div>
    <div class="stats-col" id="weekRecords"></div>
  </div>

  <select id="monthSelect"></select>

  <div class="columns">
    <div class="col">
      <h3>Sleep</h3>
      <div id="sleepList"></div>
    </div>
    <div class="col">
      <h3>Wake</h3>
      <div id="wakeList"></div>
    </div>
    <div class="col">
      <h3>Bedtime</h3>
      <div id="bedtimeList"></div>
    </div>
  </div>

  <div class="chartbox">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// 时间
function updateClock() {
  document.getElementById("time").innerText = new Date().toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

// storage
function getData(){ return JSON.parse(localStorage.getItem("sleepData")||"[]"); }
function saveData(data){ localStorage.setItem("sleepData",JSON.stringify(data)); }

// Record
document.getElementById("recordBtn").addEventListener("click",()=>{
  let now = new Date();
  let hour = now.getHours();
  let type = (hour >=18 || hour <6) ? "sleep" : "wake";

  let data=getData();
  data.push({type,time:Date.now()});
  saveData(data);
  render();
});

// Delete
document.getElementById("deleteBtn").addEventListener("click",()=>{
  let data=getData();
  if(data.length>0){
    data.sort((a,b)=>b.time-a.time);
    data.shift();
    saveData(data);
    render();
  }
});

// Export
document.getElementById("exportBtn").addEventListener("click",()=>{
  let data=getData();
  let blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  let url = URL.createObjectURL(blob);
  let a=document.createElement("a");
  a.href=url;
  a.download="sleep-data.json";
  a.click();
  URL.revokeObjectURL(url);
});

// utils
function minutes(t){ let d = new Date(t); return d.getHours()*60 + d.getMinutes(); }

function compare(current,prev){
  if(!prev) return "";
  let diff = minutes(current) - minutes(prev);
  let m = Math.abs(diff);
  if(diff<0) return `<div class="compare earlier">↑ ${m} min earlier</div>`;
  else return `<div class="compare later">↓ ${m} min later</div>`;
}

function formatDateWithWeekday(t){
  const d = new Date(t);
  const weekDays=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return `${d.getFullYear()%100}-${d.getMonth()+1}-${d.getDate()} ${weekDays[d.getDay()]} ${d.getHours()}:${d.getMinutes()<10?'0':''}${d.getMinutes()}`;
}

function getMonthStr(t){
  const d = new Date(t);
  return d.getFullYear()+"-M"+(d.getMonth()+1);
}

// ⭐ 修复后的 render
function render(){
  let data=getData();
  let sel=document.getElementById("monthSelect").value;
  let showData = (sel && sel!=="ALL") ? data.filter(d=>getMonthStr(d.time)===sel) : data;

  let sleep=showData.filter(d=>d.type==="sleep");
  let wake=showData.filter(d=>d.type==="wake");

  // Sleep
  document.getElementById("sleepList").innerHTML =
    sleep.map((r,i)=>`
      <div class="item">
        <div class="main-text">${formatDateWithWeekday(r.time)}</div>
        ${compare(r.time,sleep[i-1]?.time) || '<div class="compare">&nbsp;</div>'}
      </div>
    `).join("");

  // Wake
  document.getElementById("wakeList").innerHTML =
    wake.map((r,i)=>`
      <div class="item">
        <div class="main-text">${formatDateWithWeekday(r.time)}</div>
        ${compare(r.time,wake[i-1]?.time) || '<div class="compare">&nbsp;</div>'}
      </div>
    `).join("");

  // Bedtime
  let html=[];
  for(let i=0;i<Math.min(sleep.length,wake.length);i++){
    let mins = (minutes(wake[i].time) - minutes(sleep[i].time) + 1440)%1440;

    html.push(`
      <div class="item">
        <div class="main-text">${Math.floor(mins/60)}:${mins%60<10?'0':''}${mins%60}</div>
        <div class="compare">&nbsp;</div>
      </div>
    `);
  }
  document.getElementById("bedtimeList").innerHTML=html.join("");

  updateMonths();
  updateChart();
  updateStats(showData);
}

// 其余逻辑保持完全不变（chart / stats / test functions）
document.getElementById("monthSelect").addEventListener("change",render);
render();
</script>

</body>
</html>
