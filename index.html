<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Metronome">
<link rel="apple-touch-icon" href="apple-touch-icon1.png">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background:#f2f2f7;
  margin:0;
  padding:0;
}

.container{
  width:100%;
  min-height:100vh;
  background:white;
  padding:20px;
  box-sizing:border-box;
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:60px;
}

.time{
  font-size:40px;
  margin-bottom:60px;
  color:#555;
  text-align:center;
}

.controls{
  display:flex;
  gap:12px;
  margin-bottom:40px;
}

button{
  flex:1;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:40px;
  cursor:pointer;
}

.record{
  background:#10b981;
  color:white;
}

.delete{
  background:#ef4444;
  color:white;
}

.export{
  background:#facc15;
  color:white;
}

select{
  margin:12px 0;
  width:100%;
  padding:12px;
  font-size:40px;
}

/* 统计区域 */
.stats-container{
  display:flex;
  gap:10px;
  margin-bottom:60px;
}

.stats-col{
  flex:1;
  background:#f9fafb;
  padding:12px;
  border-radius:10px;
  font-size:25px;
}

/* 表格 */
.columns{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.col{
  flex:1;
  background:#fafafa;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.col h3{
  font-size:45px;
  margin-bottom:40px;
}

.item{
  font-size:30px;
  padding:6px;
  border-bottom:1px solid #eee;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.compare{
  font-size:25px;
}

.earlier{ color:green; }
.later{ color:red; }

.chartbox{
  margin-top:60px;
}

canvas{
  max-height:700px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Sleep Tracker</h1>
  <div class="time" id="time"></div>

  <div class="controls">
    <button id="recordBtn" class="record">Record</button>
    <button id="deleteBtn" class="delete">Delete Latest</button>
    <button id="exportBtn" class="export">Export Data</button>
  </div>

  <!-- 统计区域 -->
  <div class="stats-container">
    <div class="stats-col" id="weekdayStats"></div>
    <div class="stats-col" id="weekendStats"></div>
  </div>

  <select id="monthSelect"></select>

  <div class="columns">
    <div class="col">
      <h3>Sleep</h3>
      <div id="sleepList"></div>
    </div>
    <div class="col">
      <h3>Wake</h3>
      <div id="wakeList"></div>
    </div>
    <div class="col">
      <h3>Bedtime</h3>
      <div id="bedtimeList"></div>
    </div>
  </div>

  <div class="chartbox">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// 时间显示
function updateClock() {
  document.getElementById("time").innerText = new Date().toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

// storage
function getData(){ return JSON.parse(localStorage.getItem("sleepData")||"[]"); }
function saveData(data){ localStorage.setItem("sleepData",JSON.stringify(data)); }

// Record
document.getElementById("recordBtn").addEventListener("click",()=>{
  let now = new Date();
  let hour = now.getHours();
  let type = (hour >=18 || hour <6) ? "sleep" : "wake";

  let data=getData();
  data.push({type,time:Date.now()});
  saveData(data);
  render();
});

// Delete
document.getElementById("deleteBtn").addEventListener("click",()=>{
  let data=getData();
  if(data.length>0){
    data.sort((a,b)=>b.time-a.time);
    data.shift();
    saveData(data);
    render();
  }
});

// Export
document.getElementById("exportBtn").addEventListener("click",()=>{
  let data=getData();
  let blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  let url = URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="sleep-data.json";
  a.click();

  URL.revokeObjectURL(url);
});

// utils
function minutes(t){ let d = new Date(t); return d.getHours()*60 + d.getMinutes(); }

function compare(current,prev){
  if(!prev) return "";
  let diff = minutes(current) - minutes(prev);
  let m = Math.abs(diff);
  if(diff<0) return `<div class="compare earlier">↑ ${m} min earlier</div>`;
  else return `<div class="compare later">↓ ${m} min later</div>`;
}

function formatDateWithWeekday(t){
  const d = new Date(t);
  const weekDays=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return `${d.getFullYear()%100}-${d.getMonth()+1}-${d.getDate()} ${weekDays[d.getDay()]} ${d.getHours()}:${d.getMinutes()<10?'0':''}${d.getMinutes()}`;
}

function getMonthStr(t){
  const d = new Date(t);
  return d.getFullYear()+"-M"+(d.getMonth()+1);
}

// render
function render(){
  let data=getData();

  let monthSel=document.getElementById("monthSelect");
  let selValue=monthSel.value;
  let showData = (selValue && selValue!=="ALL") ? data.filter(d=>getMonthStr(d.time)===selValue) : data;

  // ✅ 关键修改：按时间倒序
  let sleep=showData.filter(d=>d.type==="sleep").sort((a,b)=>b.time-a.time);
  let wake=showData.filter(d=>d.type==="wake").sort((a,b)=>b.time-a.time);

  document.getElementById("sleepList").innerHTML =
    sleep.map((r,i)=>`
      <div class="item">
        <div>${formatDateWithWeekday(r.time)}</div>
        ${compare(r.time,sleep[i-1]?.time)}
      </div>`).join("");

  document.getElementById("wakeList").innerHTML =
    wake.map((r,i)=>`
      <div class="item">
        <div>${formatDateWithWeekday(r.time)}</div>
        ${compare(r.time,wake[i-1]?.time)}
      </div>`).join("");

  // Bedtime（增加占位行）
  let html=[];
  for(let i=0;i<Math.min(sleep.length,wake.length);i++){
    let mins = (minutes(wake[i].time) - minutes(sleep[i].time) + 1440)%1440;

    html.push(`
      <div class="item">
        <div>${Math.floor(mins/60)}:${mins%60<10?'0':''}${mins%60}</div>
        <div class="compare">&nbsp;</div>
      </div>
    `);
  }
  document.getElementById("bedtimeList").innerHTML=html.join("");

  updateMonths();
  updateChart();
  updateStats(showData);
}

// 月份
function updateMonths(){
  let data=getData();
  let months=[...new Set(data.map(d=>getMonthStr(d.time)))];
  let select=document.getElementById("monthSelect");
  let curVal=select.value;

  select.innerHTML="<option>ALL</option>";
  months.forEach(m=>select.innerHTML+=`<option>${m}</option>`);

  if(curVal) select.value=curVal; else select.value="ALL";
}

// 图表（保持原样）
let chart;
function updateChart(){
  let ctx=document.getElementById("chart").getContext("2d");
  if(chart) chart.destroy();
  chart=new Chart(ctx,{type:"line",data:{labels:[],datasets:[]}});
}

// 统计（删除Week Records部分）
function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null; }

function updateStats(data){
  let weekdaySleep=[], weekendSleep=[];

  data.forEach(d=>{
    let day=new Date(d.time).getDay();
    let m=minutes(d.time);
    if(day===0||day===6){
      if(d.type==="sleep") weekendSleep.push(m);
    }else{
      if(d.type==="sleep") weekdaySleep.push(m);
    }
  });

  function fmtTime(m){ if(!m && m!==0) return "-"; let h=Math.floor(m/60); let mm=Math.round(m%60); return h+":"+(mm<10?'0':'')+mm; }

  document.getElementById("weekdayStats").innerHTML=
    `<b>Weekday Avg</b><br>Sleep: ${fmtTime(avg(weekdaySleep))}`;

  document.getElementById("weekendStats").innerHTML=
    `<b>Weekend Avg</b><br>Sleep: ${fmtTime(avg(weekendSleep))}`;
}

document.getElementById("monthSelect").addEventListener("change",render);
render();
</script>

</body>
</html>
