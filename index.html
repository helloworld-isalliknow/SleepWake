<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Metronome">
<link rel="apple-touch-icon" href="apple-touch-icon1.png">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background:#f2f2f7;
  margin:0;
  padding:0;
}

.container{
  width:100%;
  min-height:100vh;
  background:white;
  padding:20px;
  box-sizing:border-box;
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:60px;
}

.time{
  font-size:40px;
  margin-bottom:40px;
  color:#555;
  text-align:center;
}

.controls{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

button{
  flex:1;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:40px;
  cursor:pointer;
}

/* 恢复按钮颜色 */
.record{ background:#10b981; color:white; }
.delete{ background:#ef4444; color:white; }
.export{ background:#facc15; color:white; }

select{
  margin:12px 0;
  width:100%;
  padding:12px;
  font-size:40px;
}

/* 统计区域 */
.stats-container{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.stats-col{
  flex:1;
  background:#f9fafb;
  padding:12px;
  border-radius:10px;
  font-size:25px;
}

/* Sleep/Wake/Bedtime 表格 */
.columns{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.col{
  flex:1;
  background:#fafafa;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

.col h3{
  font-size:35px;
  margin-bottom:20px;
}

.item{
  padding:6px;
  border-bottom:1px solid #eee;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:28px;
}

.compare{
  font-size:22px;
}

.earlier{ color:green; }
.later{ color:red; }

.chartbox{
  margin-top:40px;
}

canvas{
  max-height:400px;
  width:100%;
}
</style>
</head>

<body>
<div class="container">

<h1>Sleep Tracker</h1>
<div class="time" id="time"></div>

<div class="controls">
  <button id="recordBtn" class="record">Record</button>
  <button id="deleteBtn" class="delete">Delete Latest</button>
  <button id="exportBtn" class="export">Export Data</button>
</div>

<div class="stats-container">
  <div class="stats-col" id="weekdayStats"></div>
  <div class="stats-col" id="weekendStats"></div>
</div>

<select id="monthSelect"></select>

<div class="columns">
  <div class="col">
    <h3>Sleep</h3>
    <div id="sleepList"></div>
  </div>
  <div class="col">
    <h3>Wake</h3>
    <div id="wakeList"></div>
  </div>
  <div class="col">
    <h3>Bedtime</h3>
    <div id="bedtimeList"></div>
  </div>
</div>

<div class="chartbox">
  <canvas id="chart"></canvas>
</div>
</div>

<script>
// 时间显示
function updateClock(){
  document.getElementById("time").innerText = new Date().toLocaleString();
}
setInterval(updateClock,1000);
updateClock();

// localStorage
function getData(){ return JSON.parse(localStorage.getItem("sleepData")||"[]"); }
function saveData(data){ localStorage.setItem("sleepData",JSON.stringify(data)); }

// Record
document.getElementById("recordBtn").addEventListener("click", ()=>{
  let now = new Date();
  let type = (now.getHours() >=18 || now.getHours()<6) ? "sleep":"wake";
  let data = getData();
  data.push({type,time:Date.now()});
  saveData(data);
  render();
});

// Delete
document.getElementById("deleteBtn").addEventListener("click", ()=>{
  let data = getData();
  if(data.length>0){
    data.sort((a,b)=>b.time-a.time);
    data.shift();
    saveData(data);
    render();
  }
});

// Export
document.getElementById("exportBtn").addEventListener("click", ()=>{
  let data = getData();
  let blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "sleep-data.json";
  a.click();
  URL.revokeObjectURL(a.href);
});

// utils
function minutes(t){ return new Date(t).getHours()*60 + new Date(t).getMinutes(); }

function compare(current,prev){
  if(!prev || !current) return "";
  let diff = minutes(current)-minutes(prev);
  if(diff>720) diff-=1440;
  if(diff<-720) diff+=1440;
  let m = Math.abs(diff);
  return diff<0
    ? `<div class="compare earlier">↑ ${m} min earlier</div>`
    : `<div class="compare later">↓ ${m} min later</div>`;
}

function formatDateWithWeekday(t){
  const d = new Date(t);
  const weekDays=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return `${d.getFullYear()%100}-${d.getMonth()+1}-${d.getDate()} ${weekDays[d.getDay()]} ${d.getHours()}:${d.getMinutes()<10?'0':''}${d.getMinutes()}`;
}

function getMonthStr(t){
  const d = new Date(t);
  return d.getFullYear()+"-M"+(d.getMonth()+1);
}

// -------------------- 月份下拉
function updateMonths(){
  let data = getData();
  let months = [...new Set(data.map(d=>getMonthStr(d.time)))];
  let select = document.getElementById("monthSelect");
  let cur = select.value;
  select.innerHTML="<option value='ALL'>ALL</option>"+months.map(m=>`<option>${m}</option>`).join("");
  if(cur) select.value = cur; else select.value="ALL";
}

// -------------------- 统计
function avg(arr){ return arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null; }

function updateStats(data){
  let weekdaySleep=[], weekdayWake=[], weekendSleep=[], weekendWake=[];
  data.forEach(d=>{
    let day=new Date(d.time).getDay();
    if(day===0||day===6){
      if(d.type==="sleep") weekendSleep.push(minutes(d.time));
      if(d.type==="wake") weekendWake.push(minutes(d.time));
    }else{
      if(d.type==="sleep") weekdaySleep.push(minutes(d.time));
      if(d.type==="wake") weekdayWake.push(minutes(d.time));
    }
  });
  function fmtM(m){ if(!m && m!==0) return "-"; return Math.floor(m/60)+":"+(m%60<10?'0':'')+m%60; }
  function avgBedtime(sleepArr,wakeArr){
    if(sleepArr.length===0||wakeArr.length===0) return "-";
    let total=0;
    for(let i=0;i<Math.min(sleepArr.length,wakeArr.length);i++){
      total += (wakeArr[i]-sleepArr[i]+1440)%1440;
    }
    return fmtM(Math.round(total/Math.min(sleepArr.length,wakeArr.length)));
  }

  document.getElementById("weekdayStats").innerHTML=
    `<b>Weekday Avg</b><br>Sleep: ${fmtM(avg(weekdaySleep))}<br>Wake: ${fmtM(avg(weekdayWake))}<br>Bedtime: ${avgBedtime(weekdaySleep,weekdayWake)}`;
  document.getElementById("weekendStats").innerHTML=
    `<b>Weekend Avg</b><br>Sleep: ${fmtM(avg(weekendSleep))}<br>Wake: ${fmtM(avg(weekendWake))}<br>Bedtime: ${avgBedtime(weekendSleep,weekendWake)}`;
}

// -------------------- 图表
let chart;
function minutesForChart(t){ let d=new Date(t); return (d.getHours()*60+d.getMinutes()-240+1440)%1440; }
function formatTimeFromMins(m){ let total=(m+240)%1440; return Math.floor(total/60)+":"+(total%60<10?'0':'')+total%60; }
function formatDateForChart(t){ const d = new Date(t); return `${d.getFullYear()%100}-${d.getMonth()+1}-${d.getDate()}`; }

function updateChart(){
  let data = getData();
  let month = document.getElementById("monthSelect").value;
  let showData = (month && month!=="ALL") ? data.filter(d=>getMonthStr(d.time)===month) : data;
  let sleep = showData.filter(d=>d.type==="sleep");
  let wake = showData.filter(d=>d.type==="wake");

  let labels = sleep.map(s=>formatDateForChart(s.time));
  let sleepY = sleep.map(s=>minutesForChart(s.time));
  let wakeY = wake.map(w=>minutesForChart(w.time));

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart").getContext("2d"),{
    type:"line",
    data:{ labels, datasets:[
      {label:"Sleep", data:sleepY, borderColor:"#10b981", fill:false},
      {label:"Wake", data:wakeY, borderColor:"#f59e0b", fill:false}
    ]},
    options:{ plugins:{ legend:{ labels:{ font:{size:20} } } }, scales:{ x:{ ticks:{ font:{size:16} } }, y:{ min:0, max:1440, ticks:{ stepSize:240, font:{size:14}, callback:v=>formatTimeFromMins(v) } } } }
  });
}

// -------------------- render
function render(){
  let data = getData();
  let month = document.getElementById("monthSelect").value;
  let showData = (month && month!=="ALL") ? data.filter(d=>getMonthStr(d.time)===month) : data;

  let sleep = showData.filter(d=>d.type==="sleep").sort((a,b)=>b.time-a.time);
  let wake = showData.filter(d=>d.type==="wake").sort((a,b)=>b.time-a.time);

  if(sleep.length>wake.length) wake=[null,...wake];

  document.getElementById("sleepList").innerHTML = sleep.map((r,i)=>
    `<div class="item"><div>${formatDateWithWeekday(r.time)}</div>${compare(r.time,sleep[i+1]?.time)}</div>`
  ).join("");

  document.getElementById("wakeList").innerHTML = wake.map((r,i)=>
    `<div class="item"><div>${r?formatDateWithWeekday(r.time):""}</div>${r?compare(r.time,wake[i+1]?.time):'<div class="compare">&nbsp;</div>'}</div>`
  ).join("");

  document.getElementById("bedtimeList").innerHTML = sleep.map((s,i)=>{
    if(!wake[i]) return "";
    let m = (minutes(wake[i].time)-minutes(s.time)+1440)%1440;
    return `<div class="item"><div>${Math.floor(m/60)}:${m%60<10?'0':''}${m%60}</div><div class="compare">&nbsp;</div></div>`;
  }).join("");

  updateMonths();
  updateStats(showData);
  updateChart();
}

document.getElementById("monthSelect").addEventListener("change",render);
render();
</script>
</body>
</html>
