<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:-apple-system;
  margin:0;
  background:white;
}

.container{
  width:100%;
  min-height:100vh;
  padding:20px;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  box-sizing:border-box;
}

.controls{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  color:white;
}

.record{background:#10b981;}
.delete{background:#ef4444;}
.export{background:#facc15;color:black;}

.columns{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
  background:#f5f5f5;
  border-radius:10px;
  padding:10px;
}

.item{
  font-size:13px;
  border-bottom:1px solid #ddd;
  padding:6px;
}

.compare{font-size:11px;}
.earlier{color:green;}
.later{color:red;}

.stats{margin-top:15px;font-size:13px;}
</style>
</head>

<body>

<div class="container">

<h2>Sleep Tracker</h2>
<div id="time"></div>

<div class="controls">
  <button class="record" onclick="record()">Record</button>
  <button class="delete" onclick="deleteLatest()">Delete Latest</button>
  <button class="export" onclick="exportData()">Export</button>
</div>

<select id="monthSelect"></select>

<div class="columns">
  <div class="col">
    <h3>Sleep</h3>
    <div id="sleepList"></div>
  </div>
  <div class="col">
    <h3>Wake</h3>
    <div id="wakeList"></div>
  </div>
</div>

<canvas id="chart"></canvas>

<div class="stats" id="stats"></div>

</div>

<script>

// 时间
setInterval(()=>document.getElementById("time").innerText=new Date().toLocaleString(),1000);

// 数据
function getData(){return JSON.parse(localStorage.getItem("sleepData")||"[]");}
function saveData(d){localStorage.setItem("sleepData",JSON.stringify(d));}

// 记录
function record(){
  let h=new Date().getHours();
  let type=(h>=18||h<6)?"sleep":"wake";
  let d=getData();
  d.push({type,time:Date.now()});
  saveData(d);
  render();
}

// 删除
function deleteLatest(){
  let d=getData();
  d.pop();
  saveData(d);
  render();
}

// 导出
function exportData(){
  let blob=new Blob([localStorage.getItem("sleepData")||"[]"]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="sleepData.json";
  a.click();
}

// 工具
function minutes(t){let d=new Date(t);return d.getHours()*60+d.getMinutes();}
function fmtTime(m){let h=Math.floor(m/60);let mm=m%60;return h+":"+mm.toString().padStart(2,'0');}

// 同比
function compare(cur,prev){
  if(!prev) return "";
  let diff=minutes(cur)-minutes(prev);
  let m=Math.abs(diff);
  return diff<0?
    `<div class="compare earlier">↑ ${m} min earlier</div>`:
    `<div class="compare later">↓ ${m} min later</div>`;
}

// 睡眠时长计算
function calcDurations(data){
  let pairs=[];
  let lastSleep=null;

  data.forEach(d=>{
    if(d.type==="sleep") lastSleep=d;
    if(d.type==="wake" && lastSleep){
      pairs.push({sleep:lastSleep.time,wake:d.time});
      lastSleep=null;
    }
  });
  return pairs;
}

// 渲染
function render(){
  let data=getData();

  let sleep=data.filter(d=>d.type==="sleep");
  let wake=data.filter(d=>d.type==="wake");

  let pairs=calcDurations(data);

  document.getElementById("sleepList").innerHTML=sleep.map((d,i)=>{
    let dur="";
    let p=pairs.find(p=>p.sleep===d.time);
    if(p){
      let m=Math.floor((p.wake-p.sleep)/60000);
      dur=`<div>${Math.floor(m/60)}h ${m%60}m</div>`;
    }
    return `<div class="item">${new Date(d.time).toLocaleString()}${compare(d.time,sleep[i-1]?.time)}${dur}</div>`;
  }).join("");

  document.getElementById("wakeList").innerHTML=wake.map((d,i)=>
    `<div class="item">${new Date(d.time).toLocaleString()}${compare(d.time,wake[i-1]?.time)}</div>`
  ).join("");

  updateChart(data);
}

// 图表
let chart;
function minutesForChart(t){return (minutes(t)-240+1440)%1440;}

function updateChart(data){
  let sleep=data.filter(d=>d.type==="sleep");
  let wake=data.filter(d=>d.type==="wake");

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:sleep.map(d=>new Date(d.time).toLocaleDateString()),
      datasets:[
        {label:"Sleep",data:sleep.map(d=>minutesForChart(d.time))},
        {label:"Wake",data:wake.map(d=>minutesForChart(d.time))}
      ]
    }
  });

  calcStats(data);
}

// 统计
function calcStats(data){
  let s=data.filter(d=>d.type==="sleep").map(d=>minutes(d.time));
  let w=data.filter(d=>d.type==="wake").map(d=>minutes(d.time));
  let pairs=calcDurations(data);

  let durations=pairs.map(p=>(p.wake-p.sleep)/60000);

  function avg(a){return a.length?a.reduce((x,y)=>x+y)/a.length:null;}

  let avgDur=avg(durations);

  document.getElementById("stats").innerHTML=
  `Avg Sleep: ${fmtTime(avg(s))}<br>
   Avg Wake: ${fmtTime(avg(w))}<br>
   Avg Duration: ${avgDur?Math.floor(avgDur/60)+"h "+Math.round(avgDur%60)+"m":"-"}<br>
   Earliest Sleep: ${fmtTime(Math.min(...s))}<br>
   Earliest Wake: ${fmtTime(Math.min(...w))}`;
}

render();

</script>

</body>
</html>
