<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sleep Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Metronome">
<link rel="apple-touch-icon" href="apple-touch-icon1.png">


<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background:#f2f2f7;
  margin:0;
}

.container{
  padding:20px;
}

h1{
  text-align:center;
  font-size:60px;
}

.time{
  text-align:center;
  font-size:40px;
  margin-bottom:40px;
}

.controls{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  font-size:30px;
  padding:10px;
}

.stats-container{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.stats-col{
  flex:1;
  background:#eee;
  padding:10px;
  font-size:25px;
}

.columns{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.col{
  flex:1;
}

.item{
  padding:5px;
  border-bottom:1px solid #ddd;
}

.compare{ font-size:20px; }
.earlier{ color:green; }
.later{ color:red; }
</style>
</head>

<body>
<div class="container">

<h1>Sleep Tracker</h1>
<div class="time" id="time"></div>

<div class="controls">
<button id="recordBtn">Record</button>
<button id="deleteBtn">Delete</button>
<button id="exportBtn">Export</button>
</div>

<div class="stats-container">
<div class="stats-col" id="weekdayStats"></div>
<div class="stats-col" id="weekendStats"></div>
</div>

<select id="monthSelect"></select>

<div class="columns">
<div class="col">
<h3>Sleep</h3>
<div id="sleepList"></div>
</div>

<div class="col">
<h3>Wake</h3>
<div id="wakeList"></div>
</div>

<div class="col">
<h3>Bedtime</h3>
<div id="bedtimeList"></div>
</div>
</div>

<canvas id="chart"></canvas>

</div>

<script>
// 时间
setInterval(()=>{
  time.innerText=new Date().toLocaleString();
},1000);

// storage
function getData(){return JSON.parse(localStorage.getItem("sleepData")||"[]")}
function saveData(d){localStorage.setItem("sleepData",JSON.stringify(d))}

// record
recordBtn.onclick=()=>{
  let h=new Date().getHours()
  let type=(h>=18||h<6)?"sleep":"wake"
  let d=getData()
  d.push({type,time:Date.now()})
  saveData(d)
  render()
}

// delete
deleteBtn.onclick=()=>{
  let d=getData()
  d.sort((a,b)=>b.time-a.time)
  d.shift()
  saveData(d)
  render()
}

// export
exportBtn.onclick=()=>{
  let blob=new Blob([JSON.stringify(getData())])
  let a=document.createElement("a")
  a.href=URL.createObjectURL(blob)
  a.download="data.json"
  a.click()
}

// utils
function minutes(t){
  let d=new Date(t)
  return d.getHours()*60+d.getMinutes()
}

// ✅ 修复 compare
function compare(cur,prev){
  if(!prev) return ""

  let diff=minutes(cur)-minutes(prev)

  if(diff>720) diff-=1440
  if(diff<-720) diff+=1440

  let m=Math.abs(diff)

  return diff<0
    ? `<div class="compare earlier">↑ ${m} min earlier</div>`
    : `<div class="compare later">↓ ${m} min later</div>`
}

function fmt(t){
  let d=new Date(t)
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,"0")}`
}

// ✅ 月份下拉
function updateMonths(){
  let d=getData()
  let months=[...new Set(d.map(x=>{
    let dt=new Date(x.time)
    return dt.getFullYear()+"-"+(dt.getMonth()+1)
  }))]

  monthSelect.innerHTML="<option value='ALL'>ALL</option>"+
    months.map(m=>`<option>${m}</option>`).join("")
}

// ✅ 统计
function avg(arr){
  if(!arr.length) return "-"
  let m=arr.map(x=>minutes(x.time))
  return Math.round(m.reduce((a,b)=>a+b)/m.length)
}

function updateStats(data){
  let weekday=data.filter(x=>{
    let d=new Date(x.time).getDay()
    return d>0 && d<6
  })

  let weekend=data.filter(x=>{
    let d=new Date(x.time).getDay()
    return d===0 || d===6
  })

  weekdayStats.innerText="Weekday Avg: "+avg(weekday)
  weekendStats.innerText="Weekend Avg: "+avg(weekend)
}

// ✅ 图表
let chart
function updateChart(){
  let d=getData().slice(-10)

  let labels=d.map(x=>fmt(x.time))
  let values=d.map(x=>minutes(x.time))

  if(chart) chart.destroy()

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels,
      datasets:[{data:values}]
    }
  })
}

// render
function render(){
  let data=getData()

  let sleep=data.filter(x=>x.type==="sleep").sort((a,b)=>b.time-a.time)
  let wake=data.filter(x=>x.type==="wake").sort((a,b)=>b.time-a.time)

  if(sleep.length>wake.length) wake=[null,...wake]

  sleepList.innerHTML=sleep.map((r,i)=>
    `<div class="item">${fmt(r.time)}${compare(r.time,sleep[i+1]?.time)}</div>`
  ).join("")

  wakeList.innerHTML=wake.map((r,i)=>
    `<div class="item">${r?fmt(r.time):""}${r?compare(r.time,wake[i+1]?.time):""}</div>`
  ).join("")

  bedtimeList.innerHTML=sleep.map((s,i)=>{
    if(!wake[i]) return ""
    let m=(minutes(wake[i].time)-minutes(s.time)+1440)%1440
    return `<div class="item">${Math.floor(m/60)}h ${m%60}m</div>`
  }).join("")

  updateMonths()
  updateStats(data)
  updateChart()
}

render()
</script>

</body>
</html>
